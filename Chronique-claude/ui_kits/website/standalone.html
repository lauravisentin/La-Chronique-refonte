<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Restaurant La Chronique — Mile-end, Montréal</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" href="/assets/logo-wordmark.png">
<link rel="stylesheet" href="styles.css">

<!-- External resource dependencies (referenced by string in JSX, lifted to window.__resources) -->
<meta name="ext-resource-dependency" content="/assets/logo-wordmark.png"        data-resource-id="logo_wordmark_png" />
<meta name="ext-resource-dependency" content="/assets/facade-night.webp"        data-resource-id="facade_night_webp" />
<meta name="ext-resource-dependency" content="/assets/facade-day.jpg"           data-resource-id="facade_day_jpg" />
<meta name="ext-resource-dependency" content="/assets/dining-room-press.jpg"    data-resource-id="dining_room_press_jpg" />
<meta name="ext-resource-dependency" content="/assets/dining-room-collage.jpg"  data-resource-id="dining_room_collage_jpg" />
<meta name="ext-resource-dependency" content="/assets/signage-detail.jpg"       data-resource-id="signage_detail_jpg" />
<meta name="ext-resource-dependency" content="/assets/historique-illustration.png" data-resource-id="historique_illustration_png" />

<template id="__bundler_thumbnail" data-bg-color="#1A1A1A">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <!-- Stylised flatware mark (fork · knife · spoon) — recalls the logo silhouette -->
    <g fill="#B5A993" transform="translate(420 230)">
      <!-- Fork -->
      <rect x="6"   y="0"   width="14" height="80"  rx="5"/>
      <rect x="32"  y="0"   width="14" height="80"  rx="5"/>
      <rect x="58"  y="0"   width="14" height="80"  rx="5"/>
      <rect x="84"  y="0"   width="14" height="80"  rx="5"/>
      <path d="M0,80 Q0,98 24,108 L80,108 Q104,98 104,80 L104,74 L0,74 Z"/>
      <rect x="42"  y="108" width="20" height="170" rx="8"/>
      <rect x="38"  y="270" width="28" height="56"  rx="14"/>

      <!-- Knife -->
      <path d="M160,0 Q148,0 148,18 L148,150 Q148,168 174,168 L196,168 Q220,168 220,150 L220,18 Q220,0 208,0 Z"/>
      <rect x="170" y="168" width="22" height="100" rx="8"/>
      <rect x="166" y="262" width="30" height="58"  rx="14"/>

      <!-- Spoon -->
      <ellipse cx="320" cy="60" rx="44" ry="68"/>
      <rect x="304" y="118" width="32" height="150" rx="12"/>
      <rect x="300" y="262" width="40" height="58"  rx="18"/>
    </g>
    <!-- "la chronique" wordmark below -->
    <text x="600" y="640" text-anchor="middle"
          font-family="Cormorant Garamond, Garamond, serif"
          font-style="italic" font-size="68" fill="#FFFFFF" letter-spacing="2">
      la chronique
    </text>
    <text x="600" y="690" text-anchor="middle"
          font-family="Inter, system-ui, sans-serif"
          font-size="14" fill="#B5A993" letter-spacing="8">
      DEPUIS · 1995 · MILE-END
    </text>
  </svg>
</template>
</head>
<body>
<div id="root"></div>

<!-- Asset resolver — populated at runtime by the bundler.
     Fallback path keeps the file usable in dev when assets are colocated. -->
<script>
  window.__r = function (id) {
    return (window.__resources && window.__resources[id]) || ('/assets/' + id.replace(/_/g, '-').replace(/-(png|jpg|jpeg|webp|svg)$/, '.$1'));
  };
</script>

<!-- Custom element: <image-slot> for plate photography -->
<script src="image-slot.js"></script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="sa-atoms.jsx"></script>
<script type="text/babel" src="sa-screens-1.jsx"></script>
<script type="text/babel" src="sa-screens-2.jsx"></script>
<script type="text/babel" src="sa-app.jsx"></script>
</body>
</html>
