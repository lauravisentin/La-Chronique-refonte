<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Type — Menu line</title>
<link rel="stylesheet" href="_card.css">
<style>
  .item { display: flex; flex-direction: column; gap: 6px; padding: 14px 0; border-bottom: 1px solid var(--lc-sage-tint); }
  .item:last-child { border-bottom: 0; }
  .dish { font-family: var(--font-serif); font-style: italic; font-weight: 500; font-size: 19px; color: var(--lc-ink); }
  .pair { font-family: var(--font-serif); font-style: italic; font-size: 13px; color: var(--lc-graphite); }
  .head { font-family: var(--font-serif); font-style: italic; font-weight: 600; font-size: 14px; text-transform: uppercase; letter-spacing: 0.18em; color: var(--lc-sage); padding-bottom: 8px; }
</style>
</head>
<body class="card">
  <div class="label" style="margin-bottom: 6px;">Menu line · dish + wine pairing</div>
  <div class="head">Mises en bouche</div>
  <div class="item">
    <div class="dish">Homard du Québec / Asperge verte / Sauce américaine</div>
    <div class="pair">France, Vallée de la Loire, Menetou-Salon, Domaine Pellé, Le Carroir 2023</div>
  </div>
  <div class="item">
    <div class="dish">Foie gras de canard / Choux rouge / Bleuets</div>
    <div class="pair">France, Bourgogne, Maranges 1<sup>er</sup> cru, Bachelet-Monnot, Clos de la Boutière 2022</div>
  </div>
</body>
</html>
