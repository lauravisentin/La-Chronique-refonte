<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Color — Neutrals</title>
<link rel="stylesheet" href="_card.css">
</head>
<body class="card">
  <div class="label" style="margin-bottom: 14px;">Neutrals · backgrounds &amp; greys</div>
  <div class="grid" style="grid-template-columns: repeat(6, 1fr);">
    <div class="swatch">
      <div class="swatch__tile" style="background: #FFFFFF; border: 1px solid var(--lc-fog);"></div>
      <div class="swatch__name">White</div>
      <div class="swatch__hex">#FFFFFF</div>
    </div>
    <div class="swatch">
      <div class="swatch__tile" style="background: #FAFAF8;"></div>
      <div class="swatch__name">Paper</div>
      <div class="swatch__hex">#FAFAF8</div>
    </div>
    <div class="swatch">
      <div class="swatch__tile" style="background: #F2F2EE;"></div>
      <div class="swatch__name">Mist</div>
      <div class="swatch__hex">#F2F2EE</div>
    </div>
    <div class="swatch">
      <div class="swatch__tile" style="background: #C7C7C0;"></div>
      <div class="swatch__name">Fog</div>
      <div class="swatch__hex">#C7C7C0</div>
    </div>
    <div class="swatch">
      <div class="swatch__tile" style="background: #8E8E89;"></div>
      <div class="swatch__name">Stone</div>
      <div class="swatch__hex">#8E8E89</div>
    </div>
    <div class="swatch">
      <div class="swatch__tile" style="background: #4F4F4D;"></div>
      <div class="swatch__name">Graphite</div>
      <div class="swatch__hex">#4F4F4D</div>
    </div>
  </div>
</body>
</html>
