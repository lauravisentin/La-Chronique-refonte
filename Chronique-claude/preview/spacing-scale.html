<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Spacing scale</title>
<link rel="stylesheet" href="_card.css">
<style>
  .row-s { display: grid; grid-template-columns: 64px 80px 1fr; align-items: center; gap: 14px; padding: 7px 0; }
  .tag { font-family: var(--font-display); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--lc-stone); }
  .val { font-family: var(--font-ui); font-size: 11px; color: var(--lc-graphite); }
  .bar { height: 10px; background: var(--lc-sage); }
</style>
</head>
<body class="card">
  <div class="label" style="margin-bottom: 10px;">Spacing scale · 4-px base</div>
  <div class="row-s"><span class="tag">space-1</span><span class="val">4 px</span><div class="bar" style="width: 4px;"></div></div>
  <div class="row-s"><span class="tag">space-2</span><span class="val">8 px</span><div class="bar" style="width: 8px;"></div></div>
  <div class="row-s"><span class="tag">space-3</span><span class="val">12 px</span><div class="bar" style="width: 12px;"></div></div>
  <div class="row-s"><span class="tag">space-4</span><span class="val">16 px</span><div class="bar" style="width: 16px;"></div></div>
  <div class="row-s"><span class="tag">space-5</span><span class="val">24 px</span><div class="bar" style="width: 24px;"></div></div>
  <div class="row-s"><span class="tag">space-6</span><span class="val">32 px</span><div class="bar" style="width: 32px;"></div></div>
  <div class="row-s"><span class="tag">space-7</span><span class="val">48 px</span><div class="bar" style="width: 48px;"></div></div>
  <div class="row-s"><span class="tag">space-8</span><span class="val">72 px</span><div class="bar" style="width: 72px;"></div></div>
  <div class="row-s"><span class="tag">space-9</span><span class="val">112 px</span><div class="bar" style="width: 112px;"></div></div>
  <div class="row-s"><span class="tag">space-10</span><span class="val">168 px</span><div class="bar" style="width: 168px;"></div></div>
</body>
</html>
