<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Ombres — atmosphère</title>
<link rel="stylesheet" href="_card.css">
<style>
  body.card {
    background: var(--lc-paper);
    padding: 40px 32px 52px;
    overflow: hidden;
  }
  .label { color: var(--lc-stone); margin-bottom: 24px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 22px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .surface {
    width: 100%;
    aspect-ratio: 3/4;
    background: var(--lc-white);
    position: relative;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.6s cubic-bezier(.2,.0,.2,1), box-shadow 0.6s cubic-bezier(.2,.0,.2,1);
  }
  .surface:hover { transform: translateY(-6px); }
  .surface__inner {
    position: absolute; inset: 0;
    background-size: cover; background-position: center;
    filter: saturate(0.92);
    transition: transform 0.9s ease, filter 0.5s ease;
  }
  .surface:hover .surface__inner { transform: scale(1.05); filter: saturate(1); }
  .surface::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(180deg, transparent 50%, rgba(26,26,26,0.55));
  }

  .surface--s0 { box-shadow: none; border: 1px solid var(--hairline-soft); }
  .surface--s1 {
    box-shadow:
      0 1px 2px rgba(26,26,26,0.05),
      0 8px 20px rgba(26,26,26,0.06);
  }
  .surface--s2 {
    box-shadow:
      0 1px 2px rgba(26,26,26,0.05),
      0 18px 36px -8px rgba(26,26,26,0.12),
      0 36px 80px -20px rgba(26,26,26,0.18);
  }
  .surface--s3 {
    box-shadow:
      0 1px 2px rgba(26,26,26,0.06),
      0 40px 80px -24px rgba(26,26,26,0.35),
      0 80px 160px -40px rgba(91,93,72,0.25);
  }
  .surface:hover.surface--s0 {
    box-shadow: 0 1px 2px rgba(26,26,26,0.05), 0 8px 20px rgba(26,26,26,0.06);
  }
  .surface:hover.surface--s1 {
    box-shadow:
      0 1px 2px rgba(26,26,26,0.05),
      0 18px 36px -8px rgba(26,26,26,0.12),
      0 36px 80px -20px rgba(26,26,26,0.18);
  }
  .surface:hover.surface--s2 {
    box-shadow:
      0 1px 2px rgba(26,26,26,0.06),
      0 40px 80px -24px rgba(26,26,26,0.35),
      0 80px 160px -40px rgba(91,93,72,0.25);
  }
  .surface:hover.surface--s3 {
    box-shadow:
      0 1px 2px rgba(26,26,26,0.06),
      0 60px 120px -30px rgba(26,26,26,0.55),
      0 120px 240px -60px rgba(91,93,72,0.4);
  }

  .surface__cap {
    position: absolute; left: 14px; bottom: 12px; right: 14px;
    color: var(--lc-white); z-index: 2;
  }
  .surface__cap-name {
    font-family: var(--font-serif); font-style: italic; font-size: 11px; line-height: 1.2;
  }
  .surface__cap-tag {
    font-family: var(--font-display); font-size: 8px; letter-spacing: 0.36em; text-transform: uppercase;
    color: var(--lc-sage-soft); margin-top: 4px;
  }

  .meta {
    display: flex; flex-direction: column; gap: 4px; align-items: center;
  }
  .meta__name {
    font-family: var(--font-display); font-size: 10px; letter-spacing: 0.22em;
    text-transform: uppercase; color: var(--lc-ink);
  }
  .meta__desc {
    font-family: var(--font-serif); font-style: italic; font-size: 11px; color: var(--lc-stone);
  }
</style>
</head>
<body class="card">
  <div class="label">Échelle d’ombres · de la nappe au plat surélevé</div>

  <div class="grid">
    <div class="item">
      <div class="surface surface--s0">
        <div class="surface__inner" style="background-image: url('/assets/dining-room-press.jpg');"></div>
        <div class="surface__cap">
          <div class="surface__cap-name">À la nappe</div>
          <div class="surface__cap-tag">Sur table</div>
        </div>
      </div>
      <div class="meta">
        <div class="meta__name">shadow · 0</div>
        <div class="meta__desc">trait fin · à plat</div>
      </div>
    </div>

    <div class="item">
      <div class="surface surface--s1">
        <div class="surface__inner" style="background-image: url('/assets/dining-room-collage.jpg');"></div>
        <div class="surface__cap">
          <div class="surface__cap-name">Présentation</div>
          <div class="surface__cap-tag">Bistro</div>
        </div>
      </div>
      <div class="meta">
        <div class="meta__name">shadow · 1</div>
        <div class="meta__desc">l’assiette se pose</div>
      </div>
    </div>

    <div class="item">
      <div class="surface surface--s2">
        <div class="surface__inner" style="background-image: url('/assets/facade-night.webp');"></div>
        <div class="surface__cap">
          <div class="surface__cap-name">En service</div>
          <div class="surface__cap-tag">Signature</div>
        </div>
      </div>
      <div class="meta">
        <div class="meta__name">shadow · 2</div>
        <div class="meta__desc">la salle se floute</div>
      </div>
    </div>

    <div class="item">
      <div class="surface surface--s3">
        <div class="surface__inner" style="background-image: url('/assets/signage-detail.jpg');"></div>
        <div class="surface__cap">
          <div class="surface__cap-name">L’instant</div>
          <div class="surface__cap-tag">Sur scène</div>
        </div>
      </div>
      <div class="meta">
        <div class="meta__name">shadow · 3</div>
        <div class="meta__desc">le plat soulevé · luxe</div>
      </div>
    </div>
  </div>
</body>
</html>
