<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Top navigation</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 0; }
  .nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 22px 32px;
    border-bottom: 1px solid var(--hairline-soft);
    background: var(--lc-white);
  }
  .nav__brand { display: flex; align-items: center; gap: 14px; }
  .nav__brand img { width: 42px; }
  .nav__brand-text { line-height: 1; }
  .nav__brand-rest { font-family: var(--font-serif); font-size: 9px; letter-spacing: 0.32em; color: var(--lc-sage); margin-bottom: 4px; }
  .nav__brand-name { font-family: var(--font-display); font-weight: 300; font-size: 22px; color: var(--lc-sage); letter-spacing: 0.05em; }
  .nav__links { display: flex; align-items: center; gap: 28px; }
  .nav__links a {
    font-family: var(--font-display);
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--lc-ink);
    text-decoration: none;
    padding-bottom: 2px;
    border-bottom: 1px solid transparent;
    transition: color 0.22s, border-color 0.22s;
  }
  .nav__links a:hover { color: var(--lc-sage); border-color: var(--lc-sage); }
  .nav__links a.is-active { color: var(--lc-sage); border-color: var(--lc-sage); }
  .reserve {
    margin-left: 10px;
    padding: 10px 18px;
    font-family: var(--font-display);
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--lc-white);
    background: var(--lc-ink);
    border: 1px solid var(--lc-ink);
    border-radius: 0;
    cursor: pointer;
  }
</style>
</head>
<body class="card">
  <nav class="nav">
    <div class="nav__brand">
      <img src="/assets/logo-wordmark.png" alt="Restaurant la chronique" style="width: 160px; height: auto;">
    </div>
    <div class="nav__links">
      <a href="#">Accueil</a>
      <a href="#" class="is-active">Menu</a>
      <a href="#">À propos</a>
      <a href="#">Salon Laurier</a>
      <a href="#">Blogue</a>
      <a href="#">Contact</a>
      <button class="reserve">Réservation</button>
    </div>
  </nav>
</body>
</html>
