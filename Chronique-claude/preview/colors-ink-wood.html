<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Color — Ink &amp; warm wood</title>
<link rel="stylesheet" href="_card.css">
</head>
<body class="card">
  <div class="label" style="margin-bottom: 14px;">Ink &amp; warm wood · structure and depth</div>
  <div class="grid" style="grid-template-columns: repeat(4, 1fr);">
    <div class="swatch">
      <div class="swatch__tile" style="background: #1A1A1A;"></div>
      <div class="swatch__name">Ink</div>
      <div class="swatch__hex">#1A1A1A · text</div>
    </div>
    <div class="swatch">
      <div class="swatch__tile" style="background: #3E2A1F;"></div>
      <div class="swatch__name">Walnut</div>
      <div class="swatch__hex">#3E2A1F · wainscot</div>
    </div>
    <div class="swatch">
      <div class="swatch__tile" style="background: #6A4A38;"></div>
      <div class="swatch__name">Walnut / Soft</div>
      <div class="swatch__hex">#6A4A38</div>
    </div>
    <div class="swatch">
      <div class="swatch__tile" style="background: #B89466;"></div>
      <div class="swatch__name">Brass</div>
      <div class="swatch__hex">#B89466 · photo only</div>
    </div>
  </div>
</body>
</html>
