<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Color — Taupe (brand accent)</title>
<link rel="stylesheet" href="_card.css">
</head>
<body class="card">
  <div class="label" style="margin-bottom: 14px;">Taupe chaud · l’unique accent du système</div>
  <div class="grid" style="grid-template-columns: repeat(4, 1fr);">
    <div class="swatch">
      <div class="swatch__tile" style="background: #5C5448;"></div>
      <div class="swatch__name">Taupe / Deep</div>
      <div class="swatch__hex">#5C5448</div>
    </div>
    <div class="swatch">
      <div class="swatch__tile" style="background: #857A66; outline: 2px solid var(--lc-ink); outline-offset: 2px;"></div>
      <div class="swatch__name">Taupe</div>
      <div class="swatch__hex">#857A66 · brand</div>
    </div>
    <div class="swatch">
      <div class="swatch__tile" style="background: #B5A993;"></div>
      <div class="swatch__name">Taupe / Soft</div>
      <div class="swatch__hex">#B5A993</div>
    </div>
    <div class="swatch">
      <div class="swatch__tile" style="background: #EBE6DC;"></div>
      <div class="swatch__name">Taupe / Tint</div>
      <div class="swatch__hex">#EBE6DC</div>
    </div>
  </div>
  <p style="margin: 14px 0 0; font-family: var(--font-serif); font-style: italic; font-size: 12px; color: var(--lc-stone); line-height: 1.6;">
    Le PNG du logo conserve sa teinte d’origine sur le papier ; dans l’interface, l’accent est un taupe chaud pour rester neutre.
  </p>
</body>
</html>
