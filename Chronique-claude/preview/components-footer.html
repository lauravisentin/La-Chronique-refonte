<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Footer block</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 0; }
  .footer {
    background: var(--lc-ink);
    color: var(--lc-white);
    padding: 38px 32px 26px;
  }
  .ft-grid { display: grid; grid-template-columns: 1.4fr 1fr 1fr; gap: 32px; align-items: start; }
  .ft-brand { display: flex; flex-direction: column; gap: 10px; }
  .ft-brand img { filter: brightness(0) saturate(100%) invert(89%) sepia(8%) saturate(420%) hue-rotate(34deg) brightness(94%) contrast(84%); }
  .ft-h { font-family: var(--font-display); font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--lc-sage-soft); margin-bottom: 12px; }
  .ft-line { font-family: var(--font-ui); font-size: 13px; color: rgba(255,255,255,0.78); line-height: 1.6; }
  .ft-line a { color: inherit; text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.15); }
  .ft-line a:hover { color: var(--lc-sage-soft); border-color: var(--lc-sage-soft); }
  .ft-bottom { display: flex; justify-content: space-between; margin-top: 26px; padding-top: 18px; border-top: 1px solid rgba(255,255,255,0.10); font-family: var(--font-ui); font-size: 11px; color: rgba(255,255,255,0.55); }
</style>
</head>
<body class="card">
  <footer class="footer">
    <div class="ft-grid">
      <div class="ft-brand">
        <img src="/assets/logo-wordmark.png" alt="Restaurant la chronique" style="width: 200px; height: auto;">
        <div class="ft-line" style="margin-top: 10px;">Une cuisine inspirée et gourmande<br>depuis mars 1995.</div>
      </div>
      <div>
        <div class="ft-h">Nous joindre</div>
        <div class="ft-line">
          <a href="tel:5142713095">514&nbsp;271-3095</a><br>
          <a href="mailto:info@lachronique.qc.ca">info@lachronique.qc.ca</a><br>
          104 avenue Laurier Ouest<br>
          Montréal · QC · H2T 2N7
        </div>
      </div>
      <div>
        <div class="ft-h">Heures</div>
        <div class="ft-line">
          Mardi — Samedi<br>
          17 h 30 — 22 h<br>
          Fermé dim. et lun.
        </div>
      </div>
    </div>
    <div class="ft-bottom">
      <span>© La Chronique · 1995 — 2026</span>
      <span>Crédit photo · Fany Ducharme</span>
    </div>
  </footer>
</body>
</html>
