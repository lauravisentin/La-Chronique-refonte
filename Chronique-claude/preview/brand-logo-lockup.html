<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Logo lockup</title>
<link rel="stylesheet" href="_card.css">
<style>
  body.card { padding: 36px 40px; }
  .lockup { display: flex; align-items: center; justify-content: center; padding: 18px 0 30px; }
  .lockup img { width: 380px; max-width: 100%; height: auto; }
  .meta {
    margin-top: 6px;
    display: flex;
    gap: 36px;
    padding-top: 18px;
    border-top: 1px solid var(--hairline-soft);
  }
  .meta__col { display: flex; flex-direction: column; gap: 2px; }
  .meta__val { font-family: var(--font-ui); font-size: 12px; color: var(--lc-graphite); }
</style>
</head>
<body class="card">
  <div class="lockup">
    <img src="/assets/logo-wordmark.png" alt="Restaurant la chronique">
  </div>
  <div class="meta">
    <div class="meta__col">
      <span class="label">Color</span>
      <span class="meta__val">#7B7D62 — Sage olive</span>
    </div>
    <div class="meta__col">
      <span class="label">Asset</span>
      <span class="meta__val">assets/logo-wordmark.png · 233×61</span>
    </div>
    <div class="meta__col">
      <span class="label">Usage</span>
      <span class="meta__val">Never re-typed · always rendered as the PNG</span>
    </div>
  </div>
</body>
</html>
